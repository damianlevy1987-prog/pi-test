name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package source artifact
        run: |
          mkdir -p dist-artifacts
          tar --exclude='.git' --exclude='node_modules' -czf dist-artifacts/source-${GITHUB_REF_NAME}.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ github.ref_name }}
          retention-days: 30
          path: dist-artifacts/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
          generate_release_notes: true
