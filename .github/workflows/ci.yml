name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint 2>&1 | tee lint.log

      - name: Typecheck
        run: npm run typecheck 2>&1 | tee typecheck.log

      - name: Test
        run: npm test 2>&1 | tee test.log

      - name: Security audit (high+)
        run: npm audit --audit-level=high 2>&1 | tee audit.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            lint.log
            typecheck.log
            test.log
            audit.log
            npm-debug.log*
            **/.npm/_logs/*.log
