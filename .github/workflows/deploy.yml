name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: 'Git ref to deploy (tag/branch/SHA)'
        required: false
        default: 'master'

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    timeout-minutes: 30
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gates
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Deployment skeleton
        run: |
          echo "Deploying ref '${{ inputs.ref }}' to '${{ inputs.environment }}'"
          echo "Configure environment secrets and deployment commands here."

      - name: Upload deploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            npm-debug.log*
            **/.npm/_logs/*.log
