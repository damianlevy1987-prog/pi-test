openapi: 3.1.0
info:
  title: AI OS Security API
  version: 1.3.0
  description: Hardened API with JWT/API-key auth, RBAC, refresh/revoke, rate limiting, and validation.
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        issues:
          type: array
          items:
            type: object
    TokenRequest:
      type: object
      required: [subject, role]
      properties:
        subject:
          type: string
          example: user-123
        role:
          type: string
          enum: [analyst, operator, admin]
          example: analyst
    TokenResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RevokeRequest:
      type: object
      properties:
        refreshToken:
          type: string
        accessToken:
          type: string
security:
  - ApiKeyAuth: []
  - BearerAuth: []
paths:
  /auth/token:
    post:
      summary: Issue JWT + refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/refresh:
    post:
      summary: Exchange refresh token for new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Success
        '401':
          description: Invalid refresh token
  /auth/revoke:
    post:
      summary: Revoke refresh token and/or access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeRequest'
      responses:
        '200':
          description: Success
  /api/research:
    post:
      summary: Run research (analyst/operator/admin)
      responses:
        '200':
          description: Success
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/context:
    post:
      summary: Build context (analyst/operator/admin)
      responses:
        '200':
          description: Success
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/dispatch:
    post:
      summary: Dispatch task (operator/admin)
      responses:
        '200':
          description: Success
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/agents:
    get:
      summary: List agents (analyst/operator/admin)
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
