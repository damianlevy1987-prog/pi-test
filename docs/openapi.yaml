openapi: 3.1.0
info:
  title: AI OS Security API
  version: 1.2.0
  description: Hardened API with JWT/API-key auth, RBAC, rate limiting, and request validation.
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
    TokenRequest:
      type: object
      required: [subject, role]
      properties:
        subject:
          type: string
        role:
          type: string
          enum: [analyst, operator, admin]
    ResearchRequest:
      type: object
      required: [topic, sources]
      properties:
        topic:
          type: string
          minLength: 1
          maxLength: 500
        sources:
          type: array
          items:
            type: string
            enum: [web, database, file, api]
    ContextRequest:
      type: object
      required: [agent_id, topic]
      properties:
        agent_id:
          type: string
        topic:
          type: string
    DispatchRequest:
      type: object
      required: [agent, task]
      properties:
        agent:
          type: string
        task:
          type: object
          required: [action]
          properties:
            action:
              type: string
            target:
              type: string
security:
  - ApiKeyAuth: []
  - BearerAuth: []
paths:
  /auth/token:
    post:
      summary: Issue JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Validation error
  /api/research:
    post:
      summary: Run research (analyst/operator/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResearchRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/context:
    post:
      summary: Build context (analyst/operator/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/dispatch:
    post:
      summary: Dispatch task (operator/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/agents:
    get:
      summary: List agents (analyst/operator/admin)
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
